name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clean potentially corrupt Gradle Wrapper
        run: rm -rf gradle/wrapper gradlew gradlew.bat

      - name: Generate Clean Secure Gradle 8.4 Wrapper
        run: gradle wrapper --gradle-version 8.4 --no-daemon

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: void-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
